<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成AI最新動向 2026 — チーム学習コンテンツ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #e0dcd4;
  --text: #1a1814;
  --text2: #6b6760;
  --text3: #9e9b96;
  --accent: #1a5fa8;
  --accent-bg: #e8f0fb;
  --accent-text: #0d3d70;
  --teal: #0f6e56;
  --teal-bg: #e1f5ee;
  --amber: #854f0b;
  --amber-bg: #faeeda;
  --purple: #3c3489;
  --purple-bg: #eeedfe;
  --coral: #993c1d;
  --coral-bg: #faece7;
  --success-bg: #e1f5ee;
  --success: #085041;
  --error-bg: #fcebeb;
  --error: #791f1f;
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
}

/* Header */
.site-header {
  background: var(--text);
  color: #fff;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.site-header .logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .08em;
  font-family: 'DM Mono', monospace;
  color: #fff;
}
.site-header .badge {
  font-size: 11px;
  background: rgba(255,255,255,0.15);
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
}

/* Layout */
.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 4rem;
}

/* Progress */
.progress-wrap {
  margin-bottom: 2rem;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  margin-bottom: 6px;
}
.progress-track {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* Chapter nav */
.ch-nav {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 2rem;
}
.ch-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'DM Mono', monospace;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all .15s;
}
.ch-btn:hover { background: var(--surface2); border-color: #c0bcb4; }
.ch-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
.ch-btn.done { background: var(--teal-bg); color: var(--teal); border-color: #5dcaa5; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.75rem;
  margin-bottom: 1rem;
}

.ch-eyebrow {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  letter-spacing: .1em;
  margin-bottom: 8px;
}

.ch-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.35;
}

.tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
}
.t-blue { background: var(--accent-bg); color: var(--accent-text); }
.t-teal { background: var(--teal-bg); color: var(--teal); }
.t-amber { background: var(--amber-bg); color: var(--amber); }
.t-purple { background: var(--purple-bg); color: var(--purple); }
.t-coral { background: var(--coral-bg); color: var(--coral); }

/* Body text */
.body { font-size: 14.5px; color: var(--text2); line-height: 1.9; }
.body p { margin-bottom: 14px; }
.body p:last-child { margin-bottom: 0; }
.body strong { font-weight: 700; color: var(--text); }

/* Stats grid */
.nums-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  margin: 1.25rem 0;
}
.num-card {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 14px;
  border: 1px solid var(--border);
}
.num-card .n {
  font-size: 22px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  color: var(--text);
}
.num-card .l {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
  line-height: 1.4;
}

/* Company grid */
.company-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
  margin: 1.25rem 0;
}
.co-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  background: var(--surface);
}
.co-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.co-model { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); margin-bottom: 8px; }
.co-desc { font-size: 12px; color: var(--text2); line-height: 1.65; }

/* Infobox */
.infobox {
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 12px 16px;
  margin: 10px 0;
  font-size: 13.5px;
  color: var(--text2);
  line-height: 1.75;
}
.infobox strong { color: var(--text); }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

/* Quiz section */
.quiz-label {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text3);
  letter-spacing: .1em;
  margin-bottom: 12px;
}
.quiz-q {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 1rem;
  line-height: 1.6;
}
.opts { display: flex; flex-direction: column; gap: 8px; }
.opt {
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  cursor: pointer;
  color: var(--text);
  background: var(--surface);
  text-align: left;
  font-family: 'Noto Sans JP', sans-serif;
  line-height: 1.5;
  transition: all .15s;
}
.opt:hover:not(:disabled) { background: var(--surface2); border-color: #c0bcb4; }
.opt.correct { background: var(--success-bg); border-color: #5dcaa5; color: var(--success); }
.opt.wrong { background: var(--error-bg); border-color: #f09595; color: var(--error); }

.feedback {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  line-height: 1.75;
}
.feedback.ok { background: var(--success-bg); color: var(--success); }
.feedback.ng { background: var(--error-bg); color: var(--error); }
.feedback strong { font-weight: 700; }

/* Nav row */
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 1.5rem;
}
.nav-row button {
  flex: 1;
  padding: 10px;
  font-size: 13.5px;
  font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  cursor: pointer;
  color: var(--text);
  transition: all .15s;
}
.nav-row button:hover { background: var(--surface2); }
.nav-row button.primary {
  background: var(--text);
  color: #fff;
  border-color: var(--text);
}
.nav-row button.primary:hover { opacity: .85; }
.nav-row .spacer { flex: 1; }

/* Score */
.score-wrap {
  text-align: center;
  padding: 2.5rem 1rem;
}
.score-big {
  font-size: 56px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  color: var(--text);
}
.score-sub {
  font-size: 13px;
  color: var(--text3);
  margin-top: 4px;
  font-family: 'DM Mono', monospace;
}
.score-msg {
  font-size: 14.5px;
  color: var(--text2);
  margin-top: 1.25rem;
  line-height: 1.8;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}

/* Footer */
.site-footer {
  text-align: center;
  padding: 2rem;
  font-size: 12px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
}

/* Fade-in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim { animation: fadeUp .3s ease both; }

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 1.5rem 1rem 3rem; }
  .card { padding: 1.25rem; }
  .ch-title { font-size: 18px; }
  .company-grid { grid-template-columns: 1fr; }
  .nums-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<p><strong>プラスの影響：</strong>業務効率化の加速、AIリテラシーを持つ人材の価値向上、新産業・新職種の創出、医療・教育・科学研究での活用拡大。動画生成AIはマーケティング・映像制作ワークフローを根本から変えつつあります。</p>
<div class="nums-grid">
  <div class="num-card"><div class="n">2035年</div><div class="l">市場が9,884億ドル規模に（予測）</div></div>
  <div class="num-card"><div class="n">2030年</div><div class="l">日本国内需要2,110億ドル予測（JEITA）</div></div>
</div>
<p><strong>向き合うべき課題：</strong>ホワイトカラー職の自動化リスク（特にルーティン業務）、ディープフェイク・フィッシング詐欺の高度化、著作権・プライバシー問題、シャドーAIへのガバナンス対応。</p>
<p><strong>2026年以降の焦点：</strong>AI業界は単一の王座を巡る争いから多極的な領土分割へ進化しました。<strong>「最強のAIはどれか」より「自分の仕事に最適なAIスタックは何か」</strong>を考える時代です。</p>`,
    quiz: {
      q: '2026年の生成AI普及において、企業が「シャドーAI」対策を求められる理由は？',
      opts: ['AIが自動的に会社の資産を購入してしまうから', '従業員が会社の把握なしにAIを使うことでセキュリティ・ガバナンスリスクが生じるから', 'AIが従業員の代わりに会議に出席するから', 'AIが競合他社にデータを送信するから'],
      ans: 1,
      exp: '社員が業務で非公式にAIツールを使う「シャドーAI」が増えており、機密情報の漏洩・利用規約違反・監査リスクが生じます。企業はAI利用のルール整備と把握が急務になっています。'
    }
  }
];

let cur = 0;
let chosen = null;
let scores = new Array(chapters.length).fill(null);

function updateProgress() {
  const done = scores.filter(s => s !== null).length;
  const pct = Math.round(done / chapters.length * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = `学習進捗 (${done}/${chapters.length} 完了)`;
}

function renderNav() {
  document.getElementById('chnav').innerHTML = chapters.map((c, i) => {
    let cls = 'ch-btn';
    if (i === cur) cls += ' active';
    else if (scores[i] !== null) cls += ' done';
    return `<button class="${cls}" onclick="go(${i})">${c.label}</button>`;
  }).join('');
}

function go(i) {
  cur = i; chosen = null;
  renderNav(); renderChapter();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderChapter() {
  const c = chapters[cur];
  const answered = scores[cur] !== null;
  document.getElementById('main').innerHTML = `
    <div class="card anim">
      <div class="ch-eyebrow">CHAPTER ${cur+1} / ${chapters.length}</div>
      <h1 class="ch-title">${c.title}</h1>
      <div class="tags">${c.tags.map(t => `<span class="tag ${t.c}">${t.t}</span>`).join('')}</div>
      <div class="body">${c.body}</div>
    </div>
    <div class="card anim" style="animation-delay:.08s">
      <div class="quiz-label">理解度チェック</div>
      <div class="quiz-q">${c.quiz.q}</div>
      <div class="opts">
        ${c.quiz.opts.map((o, i) => {
          let cls = 'opt';
          if (answered) {
            if (i === c.quiz.ans) cls += ' correct';
            else if (chosen === i) cls += ' wrong';
          }
          return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="answer(${i})">${o}</button>`;
        }).join('')}
      </div>
      ${answered ? `<div class="feedback ${scores[cur] ? 'ok' : 'ng'}"><strong>${scores[cur] ? '✓ 正解！' : '✗ 不正解。'}</strong> ${c.quiz.exp}</div>` : ''}
      <div class="nav-row">
        ${cur > 0 ? `<button onclick="go(${cur-1})">← 前へ</button>` : '<div class="spacer"></div>'}
        ${cur < chapters.length - 1
          ? `<button class="primary" onclick="go(${cur+1})">次のチャプターへ →</button>`
          : `<button class="primary" onclick="showResult()">結果を見る</button>`}
      </div>
    </div>`;
}

function answer(i) {
  chosen = i;
  scores[cur] = (i === chapters[cur].quiz.ans);
  updateProgress();
  renderChapter();
}

function showResult() {
  const ok = scores.filter(s => s === true).length;
  const total = scores.filter(s => s !== null).length;
  const msgs = [
    '全問正解！2026年の生成AI最新動向をしっかり把握しています。チームへの情報共有でぜひ活躍してください。',
    '主要なトレンドはよく理解できています。間違えた章をもう一度読み返して知識を固めましょう。',
    '各チャプターを読み返して、理解を深めましょう。生成AIの変化は速いので、定期的にキャッチアップを！'
  ];
  const msg = ok === chapters.length ? msgs[0] : ok >= 3 ? msgs[1] : msgs[2];

  document.getElementById('main').innerHTML = `
    <div class="card anim">
      <div class="score-wrap">
        <div class="score-big">${ok} <span style="font-size:28px;color:#9e9b96">/ ${total}</span></div>
        <div class="score-sub">CORRECT ANSWERS</div>
        <p class="score-msg">${msg}</p>
      </div>
    </div>
    <div class="nav-row anim" style="animation-delay:.1s">
      <button onclick="go(0)">最初から復習する</button>
    </div>`;
}

renderNav();
renderChapter();
updateProgress();
</script>
</body>
</html>
